name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest

      - name: Run unit tests
        run: pytest cli_anything/n8n/tests/test_core.py -v

      - name: Run CLI smoke tests
        run: |
          cli-anything-n8n --version
          cli-anything-n8n --help
          cli-anything-n8n workflow --help
          cli-anything-n8n credential --help
